services:
  db:
    image: postgres:16-alpine
    container_name: muleradar_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: muleradar_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 3G
      NEO4J_dbms_memory_transaction_total_max: 0
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - D:/muleradar-data/neo4j/data:/data
      - D:/muleradar-data/neo4j/plugins:/var/lib/neo4j/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 20
      start_period: 180s

  redis:
    image: redis:7-alpine
    container_name: muleradar_redis
    # SIZING (fix QC 20-Jul, P4.8): Redis sekarang menyimpan DUA jenis state
    # per-akun: (1) feature_store (hash+set+zset, ~1-2KB/akun aktif) dan
    # (2) memory TGN 256 float32 (~1KB/akun aktif, TTL 30 hari via
    #     TGN_MEM_TTL_S). Estimasi kasar: ~2-3KB per akun AKTIF.
    #   500rb akun aktif  -> ~1,0-1,5 GB
    #     1jt akun aktif  -> ~2,0-3,0 GB
    # maxmemory 1gb (nilai lama) terlalu kecil begitu TGN aktif -> allkeys-lru
    # akan meng-evict memory akun yg SEDANG aktif -> state hilang diam-diam.
    # Default dinaikkan ke 2gb & dibuat configurable; SESUAIKAN dgn RAM host
    # + jumlah akun aktif nyata sebelum pilot.
    command: >
      redis-server --save 60 1 --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-2gb} --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: muleradar_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zkdata:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: muleradar_kafka
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafkadata:/var/lib/kafka/data

  backend:
    build: ./backend
    container_name: muleradar_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
      # models/ WAJIB di-mount (fix 20-Jul, P4.8): kode resolve _MODELS_DIR ke
      # /models (dari /app/streaming/../../models). Tanpa ini TGN & XGBoost
      # tak ketemu checkpoint -> scorer fallback/degradasi diam-diam.
      - ./models:/models
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Consumer real-time (P4.8): Kafka -> RealtimeScorer (TGN default) -> Neo4j +
  # alert Postgres. Dipisah dari `backend` (API) supaya bisa di-scale sendiri
  # (Phase 15.5: jalankan N replika sampai jumlah partisi topic).
  consumer:
    build: ./backend
    container_name: muleradar_consumer
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      # Base model fast-path: tgn (default) | xgb. Lihat realtime_scorer.py.
      SCORER_MODE: ${SCORER_MODE:-tgn}
      # WAJIB (fix QC 20-Jul): tanpa ini stdout Python di-buffer -> `docker logs`
      # KOSONG sampai buffer penuh/proses mati. Consumer adalah proses
      # long-running: log progres/alert praktis tak terlihat = tak bisa
      # dimonitor di produksi.
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./models:/models
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app/streaming
    command: python consumer.py
    restart: unless-stopped

  # gRPC Ingestion Gateway (Phase 5.0): pintu masuk transaksi dari CORE
  # BANKING bank -> Kafka 'transactions.raw' -> consumer. Berdampingan dgn
  # streaming/producer.py (jalur replay/demo internal), menulis ke topic yg
  # SAMA supaya hilir tak perlu tahu bedanya.
  grpc_gateway:
    build: ./backend
    container_name: muleradar_grpc
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRANSACTIONS: transactions.raw
      GRPC_PORT: "50061"
      PYTHONUNBUFFERED: "1"
    ports:
      # 50061: port 50051 dipakai Docker Desktop di Windows (lihat server.py)
      - "50061:50061"
    volumes:
      - ./backend:/app
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    # dijalankan sbg MODUL (-m) supaya import relatif di stub protobuf
    # bekerja (paket grpc_gateway), bukan `python grpc_gateway/server.py`.
    command: python -m grpc_gateway.server
    restart: unless-stopped

  # Produksi: build Vite -> serve static via nginx. Aktif default
  # (tanpa profile) supaya "docker-compose up" langsung nyalain FE+BE.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: muleradar_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Dev: Vite dev server + hot-reload, source di-mount jadi perubahan
  # kode langsung kepantul. Opt-in lewat profile "dev":
  #   docker compose --profile dev up frontend-dev
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: muleradar_frontend_dev
    profiles: ["dev"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  zkdata:
  kafkadata:
  redisdata:
